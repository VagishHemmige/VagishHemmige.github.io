- title: "Cryptococcus Cost Analysis"
  theme: "Cost-Effectiveness & Health Economics"
  description: "This project seeks to use the United States Renal Data System to study the additional cost attributable to an episode of cryptococcus
  after kidney transplantation.  Longitudinal matching between patients with cryptococcus and similar controls without is used to calculate the attributable cost."
  status: "active"
  site: "https://vagishhemmige.github.io/Cryptococcus-cost-analysis/"
  repo: null
  methods: ["cost modeling", "claims data", "health economics"]

