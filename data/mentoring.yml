- name: "Hannah Rosenthal"
  level: "Medical student"
  role: "Primary research mentor"
  current: "MS4 at Albert Einstein College of Medicine"
  years: "2025-2026"
  status: "Active"
  projects:
    - "HIV-SLK Outcomes"
    - "HOPE-CDC Analysis 2026"
  text: >
    Hannah is applying her R programming skills to perform an analysis of the SRTR database, demonstrating that people living with HIV have equivalent
    outcomes to people without HIV after simultaneous liver-kidney transplant.  She also took the lead to present these results and will lead manuscript 
    preparation.

